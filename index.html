
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dashboard { padding: 1rem 0; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
.tab { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.tab:hover:not(.active) { background: var(--color-background-secondary); }
.type-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; margin-left: 8px; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
.chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; }
.chart-title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px; }
.round-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.round-dot { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; cursor: default; position: relative; }
.overview-section { margin-bottom: 1.5rem; }
.overview-title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px; }
.player-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.player-row:last-child { border-bottom: none; }
.player-uid { font-size: 13px; font-weight: 500; min-width: 80px; color: var(--color-text-primary); font-family: var(--font-mono); }
.bar-wrap { flex: 1; height: 8px; background: var(--color-background-secondary); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.player-stat { font-size: 12px; color: var(--color-text-secondary); min-width: 90px; text-align: right; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.legend-sq { width: 10px; height: 10px; border-radius: 2px; }
.section-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
.stab { padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); font-size: 12px; cursor: pointer; }
.stab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); }
.tooltip-popup { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 11px; white-space: nowrap; z-index: 10; display: none; pointer-events: none; color: var(--color-text-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.round-dot:hover .tooltip-popup { display: block; }
</style>

const TYPE_COLORS = {
  '保守型': '#1D9E75',
  '中間搖擺型': '#378ADD',
  '中間偏高型': '#7F77DD',
  '高風險型': '#D85A30',
  '理性高效型': '#D4537E',
  '邊緣不穩定型': '#BA7517'
};

const TYPE_BG = {
  '保守型': '#E1F5EE',
  '中間搖擺型': '#E6F1FB',
  '中間偏高型': '#EEEDFE',
  '高風險型': '#FAECE7',
  '理性高效型': '#FBEAF0',
  '邊緣不穩定型': '#FAEEDA'
};

let currentTab = 'trajectory';
let compareChartInstance = null;

function getTypeColor(type) { return TYPE_COLORS[type] || '#888'; }
function getTypeBg(type) { return TYPE_BG[type] || '#f5f5f5'; }

function buildOverview() {
  const sorted = [...DATA].sort((a,b) => a.burst_rate - b.burst_rate);
  const maxEarned = Math.max(...DATA.map(d=>d.total_earned));
  const list = document.getElementById('playerList');
  list.innerHTML = sorted.map(p => {
    const c = getTypeColor(p.type);
    return `<div class="player-row">
      <span class="player-uid" style="color:${c}">${p.uid}</span>
      <div style="min-width:60px;font-size:11px;color:var(--color-text-secondary);">${p.type}</div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${p.burst_rate}%;background:${c};"></div>
      </div>
      <div class="player-stat">爆球率 <strong>${p.burst_rate}%</strong></div>
      <div class="player-stat" style="min-width:110px;">$${p.total_earned.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function buildTabs() {
  const tabs = document.getElementById('playerTabs');
  tabs.innerHTML = `<button class="tab active" onclick="selectPlayer('overview',this)">總覽</button>` +
    DATA.map(p => `<button class="tab" onclick="selectPlayer('${p.uid}',this)" style="border-left:3px solid ${getTypeColor(p.type)}">${p.uid}</button>`).join('');
}

function selectPlayer(uid, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (uid === 'overview') {
    document.getElementById('overview').style.display = 'block';
    document.getElementById('playerDetail').style.display = 'none';
    return;
  }
  const p = DATA.find(d => d.uid === uid);
  document.getElementById('overview').style.display = 'none';
  document.getElementById('playerDetail').style.display = 'block';
  renderPlayer(p);
}

function renderPlayer(p) {
  const c = getTypeColor(p.type);
  const bg = getTypeBg(p.type);
  const m = document.getElementById('metricsGrid');
  m.innerHTML = `
    <div class="metric">
      <div class="metric-label">人格類型</div>
      <div class="metric-value" style="font-size:16px;color:${c}">${p.type}</div>
    </div>
    <div class="metric">
      <div class="metric-label">爆球率</div>
      <div class="metric-value">${p.burst_rate}%</div>
      <div class="metric-sub">${p.total_bursts}/${p.total_rounds} 回合</div>
    </div>
    <div class="metric">
      <div class="metric-label">平均打氣數</div>
      <div class="metric-value">${p.avg_pumps}</div>
      <div class="metric-sub">次 / 回合</div>
    </div>
    <div class="metric">
      <div class="metric-label">總收益</div>
      <div class="metric-value" style="font-size:18px;">$${p.total_earned.toLocaleString()}</div>
    </div>
  `;
  renderTab(p);
  renderCompareChart(p);
}

function showTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const p = DATA.find(d => d.uid === document.querySelector('.tab.active:not(:first-child)').textContent);
  if (p) renderTab(p);
}

function renderTab(p) {
  const container = document.getElementById('chartContent');
  const title = document.getElementById('chartTitle');
  
  if (currentTab === 'trajectory') {
    title.textContent = '行為軌跡 — 每回合結果（綠=收款 紅=爆球）';
    const dots = p.rounds.map(r => {
      const bg = r.burst ? '#FAECE7' : '#E1F5EE';
      const border = r.burst ? '#D85A30' : '#1D9E75';
      const txt = r.burst ? '#D85A30' : '#1D9E75';
      return `<div class="round-dot" style="background:${bg};border:1.5px solid ${border};color:${txt};">
        <div class="tooltip-popup">第${r.round}回<br>打氣:${r.pumps}次<br>${r.burst?'💥爆球':'✓$'+r.earned.toLocaleString()}</div>
        ${r.round}
      </div>`;
    }).join('');
    container.innerHTML = `<div class="round-grid">${dots}</div>`;
  } else if (currentTab === 'pumps') {
    title.textContent = '每回合打氣次數';
    container.innerHTML = `<div style="position:relative;height:180px;"><canvas id="pumpsChart"></canvas></div>`;
    setTimeout(() => {
      if(window._pumpsChart) window._pumpsChart.destroy();
      window._pumpsChart = new Chart(document.getElementById('pumpsChart'), {
        type: 'bar',
        data: {
          labels: p.rounds.map(r => r.round),
          datasets: [{
            data: p.rounds.map(r => r.pumps),
            backgroundColor: p.rounds.map(r => r.burst ? 'rgba(216,90,48,0.7)' : 'rgba(29,158,117,0.7)'),
            borderRadius: 3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 } } } }
        }
      });
    }, 50);
  } else {
    title.textContent = '每回合收益（元）';
    container.innerHTML = `<div style="position:relative;height:180px;"><canvas id="earnChart"></canvas></div>`;
    setTimeout(() => {
      if(window._earnChart) window._earnChart.destroy();
      window._earnChart = new Chart(document.getElementById('earnChart'), {
        type: 'bar',
        data: {
          labels: p.rounds.map(r => r.round),
          datasets: [{
            data: p.rounds.map(r => r.earned),
            backgroundColor: p.rounds.map(r => r.burst ? 'rgba(216,90,48,0.5)' : 'rgba(55,138,221,0.7)'),
            borderRadius: 3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 }, callback: v => '$'+v.toLocaleString() } } }
        }
      });
    }, 50);
  }
}

function renderCompareChart(p) {
  setTimeout(() => {
    if (compareChartInstance) compareChartInstance.destroy();
    compareChartInstance = new Chart(document.getElementById('compareChart'), {
      type: 'line',
      data: {
        labels: p.rounds.map(r => r.round),
        datasets: [
          {
            label: '打氣次數',
            data: p.rounds.map(r => r.pumps),
            borderColor: '#378ADD', backgroundColor: 'rgba(55,138,221,0.08)',
            tension: 0.3, pointRadius: 4,
            pointBackgroundColor: p.rounds.map(r => r.burst ? '#D85A30' : '#378ADD')
          },
          {
            label: '爆球閾值',
            data: p.rounds.map(r => r.burst_at),
            borderColor: '#D85A30', borderDash: [4,3],
            tension: 0.3, pointRadius: 3, backgroundColor: 'transparent'
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.raw } }
        },
        scales: {
          x: { ticks: { font: { size: 11 }, autoSkip: false } },
          y: { ticks: { font: { size: 11 } } }
        }
      }
    });
  }, 50);
}

buildTabs();
buildOverview();
</script>
